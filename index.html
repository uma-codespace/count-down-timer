<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Countdown timer</title>
    <script defer src="./script.js"></script>
    <style>
      .attribution {
        font-size: 0.6875rem;
        text-align: center;
      }
      .attribution a {
        color: #3e52a3;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <section class="count-down container">
        <h1 class="count-down-heading">We're launching soon</h1>
        <div class="count-down-timer">
          <div class="count-down-days">
            <h2 class="in-days">00</h2>
            <p>Days</p>
          </div>
          <div class="count-down-hours">
            <h2 class="in-hours">00</h2>
            <p>Hours</p>
          </div>
          <div class="count-down-minutes">
            <h2 class="in-minutes">00</h2>
            <p>Minutes</p>
          </div>
          <div class="count-down-seconds">
            <h2 class="in-seconds">00</h2>
            <p>Seconds</p>
          </div>
        </div>
      </section>
      <section class="icons container">
        <ion-icon name="logo-facebook"></ion-icon>
        <ion-icon name="logo-pinterest"></ion-icon>
        <ion-icon name="logo-instagram"></ion-icon>
      </section>
    </div>
    <!-- <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer> -->
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
  </body>
</html>
